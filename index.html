<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto & Market Dashboard</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:tahoma;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
    }

    .container{
        width:100%;
        max-width:1200px;
        margin:auto;
        padding:20px;
    }

    .card{
        background:#1e293b;
        border-radius:20px;
        padding:25px;
        margin-top:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1,h2,h3{
        margin-bottom:20px;
    }

    input,select,button{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        margin-top:10px;
        font-size:16px;
    }

    input,select{
        background:#334155;
        color:white;
    }

    button{
        background:#22c55e;
        color:white;
        cursor:pointer;
        transition:0.3s;
        font-weight:bold;
    }

    button:hover{
        background:#16a34a;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    th,td{
        border:1px solid #475569;
        padding:12px;
        text-align:center;
    }

    th{
        background:#334155;
    }

    .hidden{
        display:none;
    }

    .infoBox{
        background:#0f172a;
        padding:20px;
        border-radius:15px;
        margin-top:20px;
        line-height:2;
    }

</style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div class="card" id="loginPage">
        <h1>ورود به داشبورد بازار</h1>

        <input type="text" id="username" placeholder="نام کاربری را وارد کنید">

        <button onclick="login()">ورود</button>
    </div>

    <!-- DASHBOARD -->
    <div class="card hidden" id="dashboard">

        <h1 id="welcomeText"></h1>

        <h3>انتخاب بازار</h3>

        <select id="marketSelect">
            <option value="gold">طلا</option>
            <option value="silver">نقره</option>
            <option value="doge">دوج کوین</option>
            <option value="arb">آربیتروم</option>
            <option value="crypto">بازار کریپتو</option>
            <option value="dxy">شاخص دلار DXY</option>
            <option value="us10y">اوراق 10 ساله</option>
            <option value="interest">نرخ بهره</option>
            <option value="inflation">تورم آمریکا</option>
        </select>

        <h3 style="margin-top:20px;">انتخاب ماه</h3>

        <select id="monthSelect">
            <option value="اردیبهشت">اردیبهشت</option>
            <option value="خرداد">خرداد</option>
            <option value="تیر">تیر</option>
            <option value="مرداد">مرداد</option>
            <option value="شهریور">شهریور</option>
            <option value="مهر">مهر</option>
            <option value="آبان">آبان</option>
            <option value="آذر">آذر</option>
            <option value="دی">دی</option>
        </select>

        <button onclick="showPrediction()">
            مشاهده پیش‌بینی
        </button>

        <div id="resultBox"></div>

    </div>

</div>

    let username = document.getElementById("username").value;

    if(username.trim() == ""){
        alert("نام کاربری وارد کن");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("welcomeText").innerText =
    "سلام " + username + " 👋";
}
